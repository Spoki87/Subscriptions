spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  mail:
    host: ${EMAIL_SMTP_URL}
    port: 587
    username: ${EMAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
      redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASSWORD:}

  app:
    base_url: ${BASE_URL}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_TIME}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

rate-limit:
  login:
    capacity: 10
    refill-tokens: 10
    refill-seconds: 60
  register:
    capacity: 5
    refill-tokens: 5
    refill-seconds: 3600

cleanup:
  refresh-token:
    interval-ms: 3600000