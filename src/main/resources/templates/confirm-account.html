<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Confirm Your Account</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333333; font-size: 24px; }
        p { color: #555555; font-size: 16px; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background-color: #4CAF50; color: #ffffff; text-decoration: none; border-radius: 4px; font-size: 16px; }
        .footer { margin-top: 40px; font-size: 12px; color: #aaaaaa; }
    </style>
</head>
<body>
<div class="container">
    <h1>Confirm your account</h1>
    <p>Thank you for registering. Please click the button below to activate your account.</p>
    <a th:href="${URL}" class="btn">Confirm Account</a>
    <p>If the button doesn't work, copy and paste the link below into your browser:</p>
    <p th:text="${URL}" style="word-break: break-all; color: #4CAF50;"></p>
    <div class="footer">
        <p>If you did not create an account, you can safely ignore this email.</p>
    </div>
</div>
</body>
</html>
