<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Reset Your Password</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333333; font-size: 24px; }
        p { color: #555555; font-size: 16px; line-height: 1.6; }
        .token-box { margin: 20px 0; padding: 16px; background-color: #f0f0f0; border-radius: 4px; font-size: 20px; font-weight: bold; letter-spacing: 4px; text-align: center; color: #333333; }
        .footer { margin-top: 40px; font-size: 12px; color: #aaaaaa; }
    </style>
</head>
<body>
<div class="container">
    <h1>Reset your password</h1>
    <p>We received a request to reset your password. Use the token below to set a new password.</p>
    <div class="token-box" th:text="${TOKEN}"></div>
    <p>This token is valid for 12 hours. If you did not request a password reset, you can safely ignore this email.</p>
    <div class="footer">
        <p>For security reasons, never share this token with anyone.</p>
    </div>
</div>
</body>
</html>
